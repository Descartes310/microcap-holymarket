
name: prod-app-deployment # workflow name

on:
  push:
    branches: [ "prod" ]

jobs:
  build-and-deploy-prod-image: #job name
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 #pull et te positionne ton repo sur la machine d'exuction

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USERNAME }} #github
          password: ${{ secrets.GHRC_TOKEN }} #token

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/prod/Dockerfile
          push: true
          tags: ghcr.io/descartes310/microcap-app-prod:latest

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan ${{ secrets.SSH_PROD_HOST }} >> ~/.ssh/known_hosts
        env:
          SSH_AUTH_SOCK: /dev/null  # Disable the SSH agent

      - name: Install sshpass
        run: sudo apt-get install sshpass
      - name: SSH into server and run docker-compose
        run: |
            sshpass -p ${{ secrets.SSH_PROD_PASSWORD }} ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_PROD_HOST }} 'cd apps/microcap/frontend && docker compose pull && docker compose up -d'
