version: '3.8'

services:

  traefik:
    image: "traefik:v2.5"
    container_name: traefik
    ports:
      - "80:80"
      #- "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      #- ./traefik:/etc/traefik  # Map a local Traefik configuration directory
    command:
      - "--api.insecure=false"
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"
      - "--log.filePath=/etc/traefik/traefik.log"

  microcap-app:
    # image: ghcr.io/descartes310/microcap-app-test:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: microcap
    environment:
      PORT: 3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.microcap-app.rule=Host(`app.microcap`)"
      - "traefik.http.routers.microcap-app.entrypoints=web"
      # - "traefik.http.routers.spring-app.tls=true"
      # - "traefik.http.routers.spring-app.tls.certresolver=myresolver"

networks:
  default:
    name: app-net
    external: true